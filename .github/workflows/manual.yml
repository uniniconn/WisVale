name: Sync WisVale_private to WisVale (同步逻辑隔离版)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出私有仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 配置Git环境
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: 安全同步（同步逻辑仅私有可见）
        env:
          SYNC_PAT: ${{ secrets.PAT }}
        run: |
          set -euo pipefail

          rm -rf public_repo sync_files
          mkdir -p sync_files

          # 这里排除整个.github目录是正常设计：同步脚本仅需在私有仓库存在
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='*.key' \
            --exclude='*.pem' \
            ./ sync_files/

          git clone https://x-access-token:${SYNC_PAT}@github.com/uniniconn/WisVale.git public_repo

          cd public_repo
          shopt -s dotglob nullglob
          # 安全清空所有非.git文件，无残留
          find . -mindepth 1 -not -path './.git*' -delete
          shopt -u dotglob nullglob

          cp -rf ../sync_files/. .

          git add --all .
          git commit -m "版本更新 $(date +"%Y-%m-%d")" --allow-empty
          git push --force origin main
