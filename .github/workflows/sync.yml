name: Sync WisVale_private to WisVale (No History)

# 触发条件：推送到main分支自动同步、手动点击触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取私有仓库最新代码（只拉取最新提交，不保留历史）
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 关键：只拉取最新1个提交，彻底不保留Git历史
          persist-credentials: false

      # 2. 配置Git身份（用于推送代码到公开仓库）
      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          # 优化：禁用Git换行符自动转换，避免跨平台文件差异
          git config --global core.autocrlf false

      # 3. 克隆公开仓库，覆盖同步最新代码（彻底解决认证+目录问题）
      - name: Sync to public repository
        run: |
          # 【核心修复1】强制删除已存在的public_repo目录，彻底解决目录非空问题
          rm -rf public_repo
          
          # 【核心修复2】直接在URL中嵌入PAT，GitHub Actions标准认证方案
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo
          
          # 【核心修复3】rsync 命令彻底优化：解决路径嵌套+过滤冗余文件
          # 1. 先排除public_repo目录本身，避免无限嵌套
          # 2. 排除所有不需要同步的文件/目录，避免仓库冗余
          rsync -av --delete \
            --exclude='public_repo/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='*.tmp' \
            ./ public_repo/
          
          # 进入公开仓库目录
          cd public_repo
          
          # 提交并推送代码（单次提交，不保留历史，无变更时跳过避免报错）
          git add .
          git commit -m "Sync from WisVale_private [${{ github.sha }}]" || echo "No changes to commit, skipping push"
          git push origin main
