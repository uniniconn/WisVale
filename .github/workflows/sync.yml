name: Sync WisVale_private to WisVale (Safe & Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Sync files (no key leak, fix directory exists error)
        run: |
          # 强制清理，无论目录是否存在，彻底删掉
          rm -rf public_repo

          # 克隆公开仓库
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 进入工作目录
          cd public_repo

          # 清空公开仓库里所有内容，保持干净
          find . -path ./.git -prune -o -exec rm -rf {} \; 2>/dev/null || true

          # 回到上级，把私有仓库所有文件复制过来
          cd ..
          cp -r ./* public_repo/

          # 进入公开仓库
          cd public_repo

          # 移除不需要同步的目录
          rm -rf .github
          rm -rf node_modules

          # 【关键】正常 git add，严格遵守 .gitignore
          # 👉 .gitignore 里的 key / 密钥 / .env 不会被提交
          git add .

          # 提交
          git commit -m "Sync from private repo [${{ github.sha }}]" || echo "No changes to commit"
          git push origin main
