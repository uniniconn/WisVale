name: Sync WisVale_private to WisVale (Safe & No Self Copy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Sync files safely
        run: |
          # 清理旧目录
          rm -rf public_repo
          
          # 克隆公仓
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 进入公仓，清空除 .git 以外的所有内容
          cd public_repo
          find . -path ./.git -prune -o -rm -rf {} \; 2>/dev/null
          cd ..

          # 【关键】只复制 非public_repo 的所有内容，避免自复制
          rsync -a \
            --exclude='public_repo/' \
            --exclude='.git/' \
            ./ public_repo/

          cd public_repo

          # 不同步的目录
          rm -rf .github node_modules

          # 遵守 .gitignore，不强制提交 → 不会上传key/密钥
          git add .

          git commit -m "Sync from private repo [${{ github.sha }}]" || echo "No changes"
          git push origin main
