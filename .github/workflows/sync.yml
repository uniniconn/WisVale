name: Sync WisVale_private to WisVale (No History)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          git config --global core.autocrlf false

      - name: Sync all files to public repo
        run: |
          rm -rf public_repo
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 同步：除了明确排除的，所有文件全部强制同步
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='*.tmp' \
            ./ public_repo/

          cd public_repo

          # 强制添加所有文件（无视 .gitignore，确保全部提交）
          git add --all --force

          git commit -m "Full sync from WisVale_private [${{ github.sha }}]" || echo "No changes"
          git push origin main
