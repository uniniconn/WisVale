name: Sync WisVale_private to WisVale (No Key Leak)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Sync with .gitignore (no keys)
        run: |
          # 克隆公开仓库
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 清空公开仓库内容
          rm -rf public_repo/*
          rm -rf public_repo/.[!.]* 2>/dev/null || true

          # 复制全部文件
          cp -r ./* public_repo/
          cp -r ./.* public_repo/ 2>/dev/null || true

          cd public_repo

          # 删掉不需要同步的目录
          rm -rf .git
          rm -rf .github
          rm -rf node_modules

          # 【关键】只提交 没有被 .gitignore 忽略的文件
          # 👉 你的 key、.env、密钥 会被 .gitignore 挡住，不会提交
          git add .

          git commit -m "Sync from private repo [${{ github.sha }}]" || echo "No changes"
          git push origin main
