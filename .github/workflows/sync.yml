name: Sync WisVale_private to WisVale (强制覆盖版)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout 私有仓库完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整代码，无任何文件遗漏
          persist-credentials: false # 安全加固，禁用默认凭证泄露风险

      - name: Configure Git 配置Git身份
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          git config --global advice.detachedHead false

      - name: 强制覆盖同步（全文件无残留）
        env:
          SYNC_PAT: ${{ secrets.PAT }} # 安全注入PAT，避免命令行日志泄露
        run: |
          set -euo pipefail # 严格错误校验，出错立即终止

          # 清理历史临时文件，避免残留干扰
          rm -rf public_repo sync_files
          mkdir -p sync_files

          # 【按需修改】复制私有仓库文件，可自行增删排除项
          # 如需100%完全复制所有文件，直接删除所有--exclude行即可
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='public_repo/' \
            --exclude='.env' \
            --exclude='*.key' \
            --exclude='*.pem' \
            ./ sync_files/

          # 克隆公共目标仓库
          git clone https://x-access-token:${SYNC_PAT}@github.com/uniniconn/WisVale.git public_repo

          # 进入公共仓库，强制删除所有非.git文件（包括隐藏文件，无任何残留）
          cd public_repo
          # 开启隐藏文件匹配+空目录兼容，确保所有文件都被遍历删除
          shopt -s dotglob nullglob
          # 彻底清空仓库，仅保留.git文件夹，不破坏提交历史
          for item in *; do
            if [ "$item" != ".git" ]; then
              rm -rf "$item"
            fi
          done
          shopt -u dotglob nullglob

          # 私有仓库文件全量复制，强制覆盖
          cp -rf ../sync_files/* .

          # 全量添加所有变更，无遗漏
          git add --all .
          # 提交变更，无变更时正常跳过不报错
          git commit -m "强制同步：私有仓库全量覆盖 $(date +"%Y-%m-%d %H:%M:%S")" || echo "=== 无代码变更，跳过提交 ==="
          # 【核心强制】强制推送到公共仓库，无视任何冲突，完全覆盖远程分支
          git push --force origin main
