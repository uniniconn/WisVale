name: Sync WisVale_private to WisVale

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Safe sync (no errors)
        run: |
          set -e

          rm -rf public_repo sync_files
          mkdir sync_files

          # 复制项目文件，排除所有不需要的
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='public_repo/' \
            ./ sync_files/

          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 进入公开仓库，只删除文件，绝对不碰 . 和 ..
          cd public_repo
          shopt -s dotglob
          for item in *; do
            if [ "$item" != ".git" ]; then
              rm -rf "$item"
            fi
          done

          # 复制文件
          cp -r ../sync_files/* .

          # 正常提交，不强制，遵守 .gitignore → 不会上传密钥
          git add .
          git commit -m "Sync from private repo" || echo "No changes"
          git push origin main
