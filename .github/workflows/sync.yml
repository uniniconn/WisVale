name: Sync WisVale_private to WisVale (Clean Sync)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Safe sync
        run: |
          # 清理
          rm -rf public_repo tmp_files
          mkdir tmp_files

          # 只复制：项目真实文件，排除所有禁止目录
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='public_repo' \
            --exclude='tmp_files' \
            ./ tmp_files/

          # 克隆公仓
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 清空公仓旧文件
          cd public_repo
          find . -path ./.git -prune -o -exec rm -rf {} + 2>/dev/null
          cd ..

          # 把干净文件拷进去
          cp -r tmp_files/* public_repo/

          # 提交
          cd public_repo
          git add .
          git commit -m "Sync from private repo [${{ github.sha }}]" || echo "No changes"
          git push origin main
