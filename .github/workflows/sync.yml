name: Sync WisVale_private to WisVale (No History)

# 触发条件：推送到main分支自动同步、手动点击触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取私有仓库最新代码（只拉取最新提交，不保留历史）
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 关键：只拉取最新1个提交，彻底不保留Git历史
          persist-credentials: false

      # 2. 配置Git身份与凭证（用于推送代码到公开仓库）
      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          # 核心修复：配置Git凭证缓存，解决PAT认证失败问题
          git config --global credential.helper store

      # 3. 克隆公开仓库，覆盖同步最新代码
      - name: Sync to public repository
        run: |
          # 修复1：强制删除已存在的public_repo目录，彻底解决目录非空问题
          rm -rf public_repo
          
          # 修复2：写入PAT到Git凭证文件，彻底解决密码读取失败问题
          echo "https://${{ secrets.PAT }}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials  # 符合Git安全权限要求，避免凭证失效
          
          # 克隆公开仓库（凭证已自动生效，无需在URL中拼接PAT）
          git clone https://github.com/uniniconn/WisVale.git public_repo
          
          # 用私有仓库代码完全覆盖公开仓库（--delete确保删除的文件同步）
          rsync -av --delete --exclude '.git' ./ public_repo/
          
          # 进入公开仓库目录
          cd public_repo
          
          # 提交并推送代码（单次提交，不保留历史）
          git add .
          git commit -m "Sync from WisVale_private [${{ github.sha }}]" || echo "No changes to commit"
          git push origin main
