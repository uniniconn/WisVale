name: Sync WisVale_private to WisVale

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"

      - name: Sync (no nested public_repo)
        run: |
          # 强制清理所有残留目录
          rm -rf public_repo sync_files

          # ==============================
          # 关键：先把 项目文件 复制到 sync_files
          # 【永远排除 public_repo】，所以绝对不会嵌套
          # ==============================
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='public_repo/' \
            --exclude='sync_files/' \
            ./ sync_files/

          # 克隆公开仓库
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 清空公开仓库里的旧文件（保留.git）
          cd public_repo
          find . -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          cd ..

          # 把干净文件复制过去
          cp -r sync_files/* public_repo/

          # 提交，遵守 .gitignore，不加 -f → 不会提交密钥
          cd public_repo
          git add .
          git commit -m "Sync from private repo" || echo "No changes"
          git push origin main
