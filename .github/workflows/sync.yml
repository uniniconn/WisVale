name: Sync WisVale_private to WisVale (No History)

# 触发条件：推送到main分支自动同步、手动点击触发
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取私有仓库最新代码（只拉取最新提交，不保留历史）
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 关键：只拉取最新1个提交，彻底不保留Git历史
          persist-credentials: false

      # 2. 配置Git身份（用于推送代码到公开仓库）
      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "你的GitHub注册邮箱"  # 替换成你自己的邮箱

      # 3. 克隆公开仓库，覆盖同步最新代码
      - name: Sync to public repository
        run: |
          # 克隆公开仓库（用PAT认证，确保有权限推送）
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo
          # 用私有仓库的最新代码，完全覆盖公开仓库
          rsync -av --delete --exclude '.git' ./ public_repo/
          # 进入公开仓库目录
          cd public_repo
          # 提交并推送代码（单次提交，不保留历史）
          git add .
          git commit -m "Sync from WisVale_private [${{ github.sha }}]" || echo "No changes to commit"
          git push origin main
