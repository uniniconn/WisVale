name: Sync WisVale_private to WisVale

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          git config --global core.autocrlf false

      # 开启调试：会打印每一条执行的命令，方便看哪一步报错
      - name: Sync with debug log
        run: |
          set -eux

          rm -rf public_repo tmp_copy
          mkdir tmp_copy

          # 复制项目文件，排除所有会冲突的目录
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='public_repo/' \
            --exclude='tmp_copy/' \
            ./ tmp_copy/

          # 克隆公仓
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          # 清空公仓内容（保留 .git）
          cd public_repo
          find . -not -path '.git' -not -path '.git/*' -delete 2>/dev/null
          cd ..

          # 把干净文件拷进去
          cp -rf tmp_copy/* public_repo/

          cd public_repo

          # 正常添加，不加 -f，遵守 .gitignore → 不会上传密钥
          git add .

          git commit -m "Sync from private repo [${{ github.sha }}]" || {
            echo "=== No changes to commit ==="
            exit 0
          }

          git push origin main
