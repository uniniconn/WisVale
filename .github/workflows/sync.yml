name: Sync WisVale_private to WisVale (No History & Full Files, exclude .github)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo (latest only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "uniniconn"
          git config --global user.email "uniniconn@gmail.com"
          git config --global core.autocrlf false

      - name: List all files in private repo
        run: ls -la

      - name: Sync to public repo
        run: |
          rm -rf public_repo
          git clone https://${{ secrets.PAT }}@github.com/uniniconn/WisVale.git public_repo

          rsync -av --delete \
            --exclude='public_repo/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='*.tmp' \
            --include='.*' \
            ./ public_repo/

          echo "=== Synced files ==="
          ls -la public_repo/

          cd public_repo
          git add -f .
          git commit -m "Sync from WisVale_private [${{ github.sha }}]" || echo "No changes to commit"
          git push origin main
